set timeout=3
set default=0

insmod all_video
insmod png
set gfxmode=1024x768x32,800x600x32,auto

if loadfont /boot/grub/fonts/unicode.pf2; then
  insmod gfxterm
  terminal_output gfxterm
fi

if background_image /boot/grub/boot_logo.png; then
  set menu_color_normal=green/black
  set menu_color_highlight=light-green/black
else
  terminal_output console
  set menu_color_normal=green/black
  set menu_color_highlight=light-green/black
fi

menuentry "КОРОЛИ OS SIMPLE UI (Kings)" {
  set gfxpayload=keep
  multiboot /boot/kernel.bin
  boot
}

menuentry "КОРОЛИ OS TEXT (fallback)" {
  set gfxpayload=text
  multiboot /boot/kernel.bin
  boot
}
